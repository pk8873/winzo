{% extends "base.html" %}{% block content %}
<div class="max-w-lg mx-auto bg-ink-800 rounded-2xl p-6 border border-white/5">
<h1 class="text-2xl font-bold mb-2">Withdraw money</h1>
<p class="text-sm text-slate-400 mb-4">Available: <b>₹{{ '%.2f'|format(balance) }}</b></p>
<form method="post" class="space-y-3">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<input name="amount" type="number" min="100" placeholder="Amount" class="w-full px-3 py-2 rounded-lg bg-ink-700 border border-white/10" required>
<select name="method" class="w-full px-3 py-2 rounded-lg bg-ink-700 border border-white/10"
  onchange="document.getElementById('bank').style.display=this.value==='bank'?'block':'none';
            document.getElementById('upi').style.display=this.value==='upi'?'block':'none';">
  <option value="upi">UPI</option><option value="bank">Bank transfer</option>
</select>
<div id="upi">
  <input name="upi_id" placeholder="UPI ID (e.g. user@upi)" class="w-full px-3 py-2 rounded-lg bg-ink-700 border border-white/10">
</div>
<div id="bank" style="display:none" class="space-y-2">
  <input name="account_holder" placeholder="Account holder name" class="w-full px-3 py-2 rounded-lg bg-ink-700 border border-white/10">
  <input name="bank_account" placeholder="Account number" class="w-full px-3 py-2 rounded-lg bg-ink-700 border border-white/10">
  <input name="ifsc" placeholder="IFSC" class="w-full px-3 py-2 rounded-lg bg-ink-700 border border-white/10">
</div>
<button class="w-full py-2 rounded-lg bg-brand-500 font-semibold">Request withdrawal</button>
</form></div>{% endblock %}
