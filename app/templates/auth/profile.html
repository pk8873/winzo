{% extends "base.html" %}{% block content %}
<div class="max-w-lg mx-auto bg-ink-800 rounded-2xl p-6 border border-white/5">
<h1 class="text-2xl font-bold mb-4">Profile</h1>
<form method="post" class="space-y-3">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<label class="text-sm text-slate-400">Name</label>
<input name="name" value="{{ current_user.name or '' }}" class="w-full px-3 py-2 rounded-lg bg-ink-700 border border-white/10">
<div class="grid grid-cols-2 gap-3 text-sm text-slate-400">
  <div>Email<div class="text-white">{{ current_user.email }}</div></div>
  <div>Mobile<div class="text-white">{{ current_user.mobile }}</div></div>
  <div>Referral code<div class="text-white">{{ current_user.referral_code }}</div></div>
  <div>Verified<div class="text-white">{{ 'Yes' if current_user.is_verified else 'No' }}</div></div>
</div>
<button class="px-4 py-2 rounded-lg bg-brand-500 font-semibold">Save</button>
</form></div>{% endblock %}
