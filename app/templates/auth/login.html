{% extends "base.html" %}{% block content %}
<div class="max-w-md mx-auto bg-ink-800 rounded-2xl p-6 border border-white/5">
<h1 class="text-2xl font-bold mb-4">Login</h1>
<form method="post" class="space-y-3">
{{ csrf_token() if csrf_token }}<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<input name="identifier" placeholder="Email or mobile" class="w-full px-3 py-2 rounded-lg bg-ink-700 border border-white/10" required>
<input name="password" type="password" placeholder="Password" class="w-full px-3 py-2 rounded-lg bg-ink-700 border border-white/10" required>
<label class="flex items-center gap-2 text-sm text-slate-400"><input type="checkbox" name="remember"> Remember me</label>
<button class="w-full py-2 rounded-lg bg-brand-500 font-semibold">Login</button>
</form>
<div class="mt-4 text-sm text-slate-400 flex justify-between">
  <a href="{{ url_for('auth.register') }}" class="hover:text-white">Create account</a>
  <a href="{{ url_for('auth.forgot') }}" class="hover:text-white">Forgot password?</a>
</div></div>{% endblock %}
