{% extends "base.html" %}{% block content %}
<div class="max-w-md mx-auto bg-ink-800 rounded-2xl p-6 border border-white/5">
<h1 class="text-2xl font-bold mb-2">Verify mobile</h1>
<p class="text-sm text-slate-400 mb-4">Enter the 6-digit OTP sent to <b>{{ mobile }}</b>.
In dev mode the code prints in the server console.</p>
<form method="post" class="space-y-3">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<input name="code" pattern="[0-9]{6}" placeholder="000000" class="w-full px-3 py-2 rounded-lg bg-ink-700 border border-white/10 tracking-widest text-center text-xl" required>
<button class="w-full py-2 rounded-lg bg-brand-500 font-semibold">Verify</button>
</form>
<form method="post" action="{{ url_for('auth.resend') }}" class="mt-3 text-sm text-slate-400">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<input type="hidden" name="mobile" value="{{ mobile }}"><input type="hidden" name="purpose" value="register">
<button class="underline">Resend OTP</button></form>
</div>{% endblock %}
