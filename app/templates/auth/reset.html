{% extends "base.html" %}{% block content %}
<div class="max-w-md mx-auto bg-ink-800 rounded-2xl p-6 border border-white/5">
<h1 class="text-2xl font-bold mb-4">Reset password</h1>
<form method="post" class="space-y-3">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<input type="hidden" name="mobile" value="{{ mobile }}">
<input name="code" placeholder="OTP" pattern="[0-9]{6}" class="w-full px-3 py-2 rounded-lg bg-ink-700 border border-white/10" required>
<input name="password" type="password" placeholder="New password" minlength="6" class="w-full px-3 py-2 rounded-lg bg-ink-700 border border-white/10" required>
<button class="w-full py-2 rounded-lg bg-brand-500 font-semibold">Update password</button>
</form></div>{% endblock %}
