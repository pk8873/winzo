{% extends "base.html" %}{% block content %}
<div class="max-w-md mx-auto bg-ink-800 rounded-2xl p-6 border border-white/5">
<h1 class="text-2xl font-bold mb-4">Create account</h1>
<form method="post" class="space-y-3">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<input name="name" placeholder="Full name" class="w-full px-3 py-2 rounded-lg bg-ink-700 border border-white/10" required>
<input name="email" type="email" placeholder="Email" class="w-full px-3 py-2 rounded-lg bg-ink-700 border border-white/10" required>
<input name="mobile" placeholder="Mobile (10 digits)" pattern="[0-9]{10}" class="w-full px-3 py-2 rounded-lg bg-ink-700 border border-white/10" required>
<input name="password" type="password" placeholder="Password (min 6)" minlength="6" class="w-full px-3 py-2 rounded-lg bg-ink-700 border border-white/10" required>
<input name="ref" placeholder="Referral code (optional)" class="w-full px-3 py-2 rounded-lg bg-ink-700 border border-white/10">
<button class="w-full py-2 rounded-lg bg-brand-500 font-semibold">Sign up</button>
</form></div>{% endblock %}
