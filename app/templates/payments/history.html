{% extends "base.html" %}{% block content %}
<h1 class="text-2xl font-bold mb-4">Deposit history</h1>
<div class="rounded-2xl bg-ink-800 border border-white/5 overflow-hidden">
<table class="w-full text-sm"><thead class="bg-ink-700"><tr><th class="p-3 text-left">Date</th><th class="p-3">Amount</th><th class="p-3">Status</th><th class="p-3">Ref</th></tr></thead>
<tbody class="divide-y divide-white/5">{% for d in rows %}<tr>
<td class="p-3">{{ d.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
<td class="p-3 font-mono">₹{{ d.amount }}</td>
<td class="p-3 capitalize">{{ d.status }}</td>
<td class="p-3 text-slate-500">{{ d.payment_id or d.order_id or '' }}</td>
</tr>{% endfor %}</tbody></table></div>{% endblock %}
