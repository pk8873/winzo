{% extends "base.html" %}{% block content %}
<h1 class="text-2xl font-bold mb-4">Inbox</h1>
<ul class="space-y-2">
{% for n in rows %}
<li class="bg-ink-800 rounded-xl p-4 border border-white/5">
  <div class="font-semibold">{{ n.title }}</div>
  <div class="text-sm text-slate-400">{{ n.body }}</div>
  <div class="text-xs text-slate-500 mt-1">{{ n.created_at.strftime('%Y-%m-%d %H:%M') }}</div>
</li>{% else %}<li class="text-slate-500">No notifications.</li>{% endfor %}
</ul>{% endblock %}
