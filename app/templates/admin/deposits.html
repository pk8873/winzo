{% extends "base.html" %}{% block content %}
<h1 class="text-2xl font-bold mb-3">Deposits</h1>
<div class="rounded-2xl bg-ink-800 border border-white/5 overflow-x-auto"><table class="w-full text-sm">
<thead class="bg-ink-700"><tr><th class="p-2">ID</th><th class="p-2">User</th><th class="p-2">Amount</th><th class="p-2">Status</th><th class="p-2">Order</th><th class="p-2">Payment</th><th class="p-2">Date</th></tr></thead>
<tbody class="divide-y divide-white/5">{% for d in rows %}<tr>
<td class="p-2">{{ d.id }}</td><td class="p-2">{{ d.user_id }}</td>
<td class="p-2 font-mono">₹{{ d.amount }}</td>
<td class="p-2">{{ d.status }}</td>
<td class="p-2 text-xs text-slate-500">{{ d.order_id or '' }}</td>
<td class="p-2 text-xs text-slate-500">{{ d.payment_id or '' }}</td>
<td class="p-2">{{ d.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
</tr>{% endfor %}</tbody></table></div>{% endblock %}
