{% extends "base.html" %}{% block content %}
<h1 class="text-2xl font-bold mb-3">Admin audit log</h1>
<div class="rounded-2xl bg-ink-800 border border-white/5 overflow-x-auto"><table class="w-full text-sm">
<thead class="bg-ink-700"><tr><th class="p-2">Date</th><th class="p-2">Admin</th><th class="p-2">Action</th><th class="p-2">Target</th><th class="p-2">Detail</th></tr></thead>
<tbody class="divide-y divide-white/5">{% for l in rows %}<tr>
<td class="p-2">{{ l.created_at.strftime('%Y-%m-%d %H:%M') }}</td><td class="p-2">{{ l.admin_id }}</td>
<td class="p-2">{{ l.action }}</td><td class="p-2">{{ l.target }}</td><td class="p-2 text-slate-400">{{ l.detail }}</td>
</tr>{% endfor %}</tbody></table></div>{% endblock %}
