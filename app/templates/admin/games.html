{% extends "base.html" %}{% block content %}
<h1 class="text-2xl font-bold mb-3">Games · full control</h1>
<div class="space-y-3">
{% for g in rows %}
<form method="post" action="{{ url_for('admin.update_game', gid=g.id) }}"
      class="bg-ink-800 rounded-2xl p-4 border border-white/5 grid md:grid-cols-7 gap-2 items-end">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<div class="md:col-span-2"><div class="text-xs text-slate-400">{{ g.category }}</div>
  <div class="font-bold">{{ g.name }}</div><div class="text-xs text-slate-500">{{ g.code }}</div></div>
<label class="text-xs text-slate-400">RTP<input name="rtp" type="number" step="0.01" min="0.5" max="0.99"
  value="{{ g.rtp }}" class="w-full px-2 py-1 rounded bg-ink-700 border border-white/10"></label>
<label class="text-xs text-slate-400">Min<input name="min_entry" type="number" value="{{ g.min_entry }}"
  class="w-full px-2 py-1 rounded bg-ink-700 border border-white/10"></label>
<label class="text-xs text-slate-400">Max<input name="max_entry" type="number" value="{{ g.max_entry }}"
  class="w-full px-2 py-1 rounded bg-ink-700 border border-white/10"></label>
<label class="text-xs text-slate-400">Round (s)<input name="round_seconds" type="number" value="{{ g.round_seconds }}"
  class="w-full px-2 py-1 rounded bg-ink-700 border border-white/10"></label>
<label class="text-xs flex items-center gap-2"><input type="checkbox" name="enabled" {% if g.is_enabled %}checked{% endif %}>Enabled</label>
<button class="px-3 py-2 rounded-lg bg-brand-500 font-semibold">Save</button>
</form>{% endfor %}
</div>{% endblock %}
