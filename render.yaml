services:
  - type: web
    name: gaming-webapp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gaming-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: gaming-redis
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

databases:
  - name: gaming-db
    plan: free

  - type: redis
    name: gaming-redis
    plan: free
    ipAllowList: []
